# Pre-Task-4 transitional allowlist.
#
# Every exception class (and error-named dataclass) in errors.py ending in
# Error or Violation requires either @tier_1_error(reason=...) for Tier-1
# exceptions or a # TIER-2: <justification> comment for Tier-2 exceptions.
# Task 4 of the ADR-010 Declaration-Trust Framework plan will add these
# decorations/comments.  These entries MUST be removed in the same commit
# that lands the Task 4 migration.
#
# The expires date is set to 2026-06-01 to ensure the transitional period does
# not silently outlast the migration window.  If Task 4 has not landed by then,
# CI will fail and force a decision.
allow_classes:
- key: src/elspeth/contracts/errors.py:TDE1:ExecutionError
  owner: architecture
  reason: >-
    Pre-Task-4 transitional — ExecutionError is a frozen dataclass (audit DTO),
    not a raiseable exception. Task 4 will add a # TIER-2 comment clarifying its
    non-exception role. Remove this entry when Task 4 lands.
  task: ADR-010 Task 4 (Track 2 Phase 2A)
  expires: '2026-06-01'
- key: src/elspeth/contracts/errors.py:TDE1:BatchPendingError
  owner: architecture
  reason: >-
    Pre-Task-4 transitional — BatchPendingError is a control-flow signal (not a
    system error). Task 4 will add a # TIER-2 justification comment. Remove this
    entry when Task 4 lands.
  task: ADR-010 Task 4 (Track 2 Phase 2A)
  expires: '2026-06-01'
- key: src/elspeth/contracts/errors.py:TDE1:GracefulShutdownError
  owner: architecture
  reason: >-
    Pre-Task-4 transitional — GracefulShutdownError is a control-flow signal for
    interrupted runs. Task 4 will add a # TIER-2 justification comment. Remove
    this entry when Task 4 lands.
  task: ADR-010 Task 4 (Track 2 Phase 2A)
  expires: '2026-06-01'
- key: src/elspeth/contracts/errors.py:TDE1:AuditIntegrityError
  owner: architecture
  reason: >-
    Pre-Task-4 transitional — AuditIntegrityError is a Tier-1 error (audit
    corruption). Task 4 will add @tier_1_error(reason=...) decoration. Remove
    this entry when Task 4 lands.
  task: ADR-010 Task 4 (Track 2 Phase 2A)
  expires: '2026-06-01'
- key: src/elspeth/contracts/errors.py:TDE1:CoalesceCollisionError
  owner: architecture
  reason: >-
    Pre-Task-4 transitional — CoalesceCollisionError tier classification is
    pending Task 4 review. Task 4 will add either @tier_1_error or a # TIER-2
    comment. Remove this entry when Task 4 lands.
  task: ADR-010 Task 4 (Track 2 Phase 2A)
  expires: '2026-06-01'
