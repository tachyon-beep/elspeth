allow_hits:
- key: engine/dependency_resolver.py:R1:_load_depends_on:fp=982376c81e3fc0d5
  owner: architecture
  reason: 'Tier 3 boundary: reads raw YAML from operator-authored settings files for cycle detection. depends_on is optional — absence means no dependencies.'
  safety: Returns empty list on missing key; only used for lightweight cycle detection, not config validation
  expires: null
- key: engine/dependency_resolver.py:R5:_load_depends_on:fp=a56f683525216d0d
  owner: architecture
  reason: 'Tier 3 validation: raw YAML from operator files — isinstance checks validate structure before use'
  safety: Raises ValueError with file path and type info on malformed input
  expires: null
- key: engine/dependency_resolver.py:R5:_load_depends_on:fp=07d449ea7db2ee15
  owner: architecture
  reason: 'Tier 3 validation: raw YAML from operator files — isinstance checks validate each entry is a mapping'
  safety: Raises ValueError with index and type info on malformed entry
  expires: null
- key: engine/executors/sink.py:R4:SinkExecutor:write:fp=f3f7223a12cd8a18
  owner: architecture
  reason: 'Post-durability callbacks: checkpoint callback fails after durable sink write'
  safety: Logged with error - sink artifact exists but checkpoint failed, resume will replay
  expires: null
- key: engine/executors/state_guard.py:R4:NodeStateGuard:__exit__:fp=b15e639a7bc1936b
  owner: architecture
  reason: Guard records FAILED when block exits without complete() — wraps recorder call to avoid masking the OrchestrationInvariantError
    raised afterward
  safety: Logs failure but always raises OrchestrationInvariantError; audit state is preserved or crash occurs
  expires: null
- key: engine/executors/state_guard.py:R4:NodeStateGuard:__exit__:fp=bd48ed04609f9dca
  owner: architecture
  reason: Guard auto-completes node_state as FAILED on unhandled exception — structural audit integrity guarantee
  safety: Wraps complete_node_state in try/except; logs failure but never masks original exception
  expires: null
- key: engine/processor.py:TC:_module_:fp=873d5f90adf363e0
  owner: architecture
  reason: TYPE_CHECKING import of TelemetryManager — RowProcessor emits telemetry events
  safety: No runtime coupling — annotation-only import behind TYPE_CHECKING guard
  expires: null
- key: engine/orchestrator/core.py:TC:_module_:fp=aea9837d6932e65d
  owner: architecture
  reason: TYPE_CHECKING import of TelemetryManager — Orchestrator accepts telemetry manager for span emission
