allow_hits:
- key: engine/executors/sink.py:R4:SinkExecutor:write:fp=45c1a6c9e0bdf4a9
  owner: architecture
  reason: 'Post-durability callbacks: checkpoint callback fails after durable sink write'
  safety: Logged with error - sink artifact exists but checkpoint failed, resume will replay
  expires: null
- key: engine/executors/state_guard.py:R4:NodeStateGuard:__exit__:fp=b15e639a7bc1936b
  owner: architecture
  reason: Guard records FAILED when block exits without complete() — wraps recorder call to avoid masking the OrchestrationInvariantError
    raised afterward
  safety: Logs failure but always raises OrchestrationInvariantError; audit state is preserved or crash occurs
  expires: null
- key: engine/executors/state_guard.py:R4:NodeStateGuard:__exit__:fp=bd48ed04609f9dca
  owner: architecture
  reason: Guard auto-completes node_state as FAILED on unhandled exception — structural audit integrity guarantee
  safety: Wraps complete_node_state in try/except; logs failure but never masks original exception
  expires: null
- key: engine/processor.py:TC:_module_:fp=873d5f90adf363e0
  owner: architecture
  reason: TYPE_CHECKING import of TelemetryManager — RowProcessor emits telemetry events
  safety: No runtime coupling — annotation-only import behind TYPE_CHECKING guard
  expires: null
- key: engine/orchestrator/core.py:TC:_module_:fp=aea9837d6932e65d
  owner: architecture
  reason: TYPE_CHECKING import of TelemetryManager — Orchestrator accepts telemetry manager for span emission
  safety: No runtime coupling — annotation-only import behind TYPE_CHECKING guard
  expires: null
- key: engine/batch_adapter.py:R9:RowWaiter:wait:fp=a2f87728c1257a92
  owner: architecture
  reason: Cleanup/pop with default - entry may not exist due to race between timeout and emit
  safety: Documented TOCTOU race pattern - pop(None) is intentional cleanup of possibly-absent entry
  expires: '2026-05-02'
- key: engine/dag_navigator.py:R1:DAGNavigator:create_continuation_work_item:fp=3f18b7103604104a
  owner: bugfix
  reason: _node_to_plugin.get() needed — not all node IDs are in plugin map (source nodes, coalesce pseudo-nodes)
  safety: None return from .get() is the correct signal for non-gate nodes; isinstance(None, GateSettings) → False
  expires: '2026-05-15'
- key: engine/processor.py:R8:RowProcessor:__init__:fp=62fc84a69f4debd9
  owner: architecture
  reason: Local dedup dict — setdefault on locally-constructed dict for deduplication by identity, not hiding missing keys
  safety: Dict is created locally at line 335, default is the value itself — no silent fallback
- key: engine/processor.py:R1:RowProcessor:_notify_coalesce_of_lost_branch:fp=5c902236276d8e5a
  owner: architecture
  reason: dict.get() correct - not all branch names have coalesce point mapping
