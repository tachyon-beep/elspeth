# _execute_update_blob DB-error rollback handler — originally added
# 2026-04-17 (silent-failure-hunter finding 3); fingerprint refreshed
# 2026-04-18 when the function was restructured to acquire the
# session-scoped mutex (I4) and to handle quota breaches via the
# _BlobQuotaExceededInTxn sentinel (I5); refreshed again on bug_004
# when the function was restructured to write new bytes to a sibling
# tempfile and swap them in via os.replace INSIDE the DB transaction
# (AFTER the active-run guard, quota check, and UPDATE), closing the
# audit-corruption window in which path-based / blob_ref sources
# could observe new bytes against the stale DB content_hash.
#
# Under the atomic-rename design the rollback-write branch is
# reachable ONLY when os.replace has already swapped the new bytes
# in AND the transaction commit subsequently fails — a vanishingly
# narrow window, but auditability-critical because it is the only
# code path that can produce file/DB divergence.  Wrapping the
# rollback in `except OSError` ensures a secondary disk fault
# (ENOSPC, EIO, EACCES) cannot mask the primary commit exception;
# add_note() attaches the blob_id and "manual reconciliation
# required" diagnostic, then the outer bare `raise` re-raises the
# primary exception (sys.exc_info() reverts after the nested
# except).  Programmer bugs (TypeError, AttributeError, etc.)
# propagate per offensive-programming policy.
#
# The sibling quota-rollback handler at the same structural position
# is NOT allowlisted because it raises a RuntimeError inside the
# handler itself (not outside) — the silent-except detector correctly
# classifies it as re-raising and does not flag it.  The quota path
# in the new design also no longer TRIGGERS the rollback branch
# (quota is checked before os.replace, so no file mutation to roll
# back); the rollback branch is retained as a defensive guardrail
# for the post-replace commit-failure window only.
- key: web/composer/tools.py:R6:_execute_update_blob:fp=5e3282626e1755d3
  owner: web-composer
  reason: Narrow OSError around storage_path.write_bytes(old_content) rollback — disk faults during post-replace divergence rollback expected; programmer bugs still propagate
  safety: Rollback failure attached as add_note() on primary_exc with blob_id and "manual reconciliation required"; primary commit exception remains the headline.  Pre-replace failures bypass the rollback branch entirely (verified by test_primary_db_exception_before_replace_propagates_without_rollback and test_quota_breach_returns_failure_without_touching_storage).
  expires: null
- key: web/composer/tools.py:R6:_execute_delete_blob:fp=3d05707f21c263bc
  owner: web-composer
  reason: Narrow OSError around tombstone restore after a failed blob delete — compensation disk faults must not bury the primary DB exception
  safety: Rollback failure is attached as add_note() on primary_exc and the original delete failure is re-raised unchanged
  expires: null
