per_file_rules:
- pattern: web/catalog/service.py
  rules:
  - R1
  reason: JSON Schema traversal — keys like "type", "anyOf", "description", "default" are conditionally present per JSON Schema spec. .get() is correct for schema dict navigation, not defensive programming.
  expires: null
  max_hits: 8
- pattern: web/catalog/routes.py
  rules:
  - R1
  reason: "False positives from @catalog_router.get() FastAPI decorators (text-based pattern match), plus one legitimate .get() on _PLURAL_TO_SINGULAR mapping (Tier 3 user input from URL path segment — unknown type returns 404)."
  expires: null
  max_hits: 6
- pattern: web/app.py
  rules:
  - R1
  reason: "False positive from @app.get() FastAPI decorator (text-based pattern match)."
  expires: null
  max_hits: 1
