  owner: web-sessions
  reason: >-
    Convergence partial-state save may fail — catch covers the full
    SQLAlchemyError family (IntegrityError, OperationalError for lock timeout
    or pool disconnect, ProgrammingError for schema drift, and siblings). A
    narrow IntegrityError catch would let siblings escape and upgrade the
    structured 422 into an unstructured 500. Narrowed from the earlier
    (ValueError, TypeError, KeyError, SQLAlchemyError) tuple per CLAUDE.md
    Tier-1 semantics — to_dict() and CompositionStateData() run on our own
    dataclass, so TypeError/KeyError from that block is a broken internal
    invariant and must propagate as a 500 with traceback rather than be
    laundered into partial_state_save_failed=True. exc_info stays omitted so
    SQLAlchemy __cause__ chains do not leak connection strings into
    structured server logs.
  safety: >-
    Returns 422 with structured error, sets partial_state_save_failed=True;
    does not swallow. Both the slog (exc_class=...) and the HTTP response
    body (partial_state_save_error=ClassName) carry the exception class
    name only — no SQL statement, no bound parameters, no __cause__ text.
    str(SQLAlchemyError) would expand to '[SQL: ...][parameters: ...]' plus
    __cause__ (DB URLs / credentials on OperationalError);
    str(ValueError/TypeError/KeyError) over dict access to
    composition-state fields can surface source options / metadata
    (potential secret refs). Redaction is uniform across both channels.
  expires: null
