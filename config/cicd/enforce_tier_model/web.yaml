# _execute_update_blob rollback handler — added 2026-04-17
# (silent-failure-hunter finding 3).  The DB-transaction except block
# restores the prior file content via storage_path.write_bytes(old_content);
# wrapping that rollback in `except OSError` ensures a secondary disk fault
# (ENOSPC, EIO, EACCES) cannot mask the primary DB exception.  The handler
# attaches a diagnostic note via primary_exc.add_note() naming the blob_id
# and flagging the file/DB inconsistency, then bare `raise` re-raises the
# primary exception (sys.exc_info() reverts after the nested except).
# Programmer bugs propagate per offensive-programming policy.
- key: web/composer/tools.py:R6:_execute_update_blob:fp=31cd8686549bf7c4
  owner: web-composer
  reason: Narrow OSError around storage_path.write_bytes(old_content) rollback — disk faults during rollback expected; programmer bugs still propagate
  safety: Rollback failure attached as add_note() on primary_exc with blob_id and "manual reconciliation required"; primary DB exception remains the headline (verified by test_rollback_oserror_does_not_mask_primary_db_exception)
  expires: null
