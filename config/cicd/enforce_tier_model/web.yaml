- key: web/app.py:R2:create_app:_request_id:fp=baeeb84f69bad3cb
  owner: web-app
  reason: 'Trust-boundary fallback. The exception handlers registered in

    create_app() use this helper to read request.state.request_id, set

    by RequestIdMiddleware on every request. If a pre-middleware path

    ever fires an exception (e.g., Starlette itself rejecting the

    request before the middleware chain completes), the attribute will

    not exist. getattr(..., "unset") provides a JSON-serialisable

    sentinel so the handler still produces a well-formed response body

    rather than compounding the failure with AttributeError.

    '
  safety: 'The "unset" sentinel cannot be confused with a real UUID4 or any

    value accepted by RequestIdMiddleware''s validator, so operators

    reading slog events and response bodies can distinguish

    middleware-bypassed failures from normal ones.

    '
  expires: null
- key: web/secrets/service.py:R6:WebSecretService:check_user_ref_resolvable:fp=a0d2b2cc298d4b0c
  owner: web-secrets
  reason: 'Narrow catch by design. check_user_ref_resolvable is the typed-error

    variant of has_ref for the HTTP /api/secrets/{name}/validate route.

    It catches SecretNotFoundError ONLY (server-store allowlist / env-var

    miss → "absent" → return False), and deliberately lets

    FingerprintKeyMissingError and SecretDecryptionError propagate to

    the app-level handlers in web/app.py, which map them to 503 / 409

    respectively. A broader catch would defeat the typed-error design

    and regress to "validate silently reports available=False with no

    deployment guidance" — the defect this method exists to close

    (issue elspeth-e9b86eca8c).

    '
  safety: 'Only SecretNotFoundError is translated to the False return value.

    Programmer-bug exceptions (AttributeError, TypeError) propagate

    uncaught; the tests in TestCheckUserRefResolvable pin the typed-

    error propagation behaviour so a future widen-the-catch regression

    fails loudly.

    '
  expires: null
- key: web/secrets/service.py:R6:WebSecretService:check_user_ref_resolvable:fp=2a6dac757cd54d12
  owner: web-secrets
  reason: 'Narrow TOCTOU catch by design. On the validate route, a user-scope

    row can disappear between has_secret_record() and get_secret()

    because those checks use separate store calls. The route contract is

    still "unresolvable -> False", so a concurrent delete must collapse

    to False rather than escape as a server error.

    '
  safety: 'Only SecretNotFoundError from the user-store probe is translated to

    False. FingerprintKeyMissingError, SecretDecryptionError, and

    programmer-bug exceptions still propagate to the app-level handlers

    or crash paths unchanged.

    '
  expires: null
- key: web/middleware/request_id.py:R1:RequestIdMiddleware:dispatch:fp=a17a1317c0fa8e7b
  owner: web-middleware
  reason: 'Tier 3 trust boundary — inbound X-Request-ID header is untrusted

    external input and is explicitly optional by design. request.headers

    is a multidict; the .get(name, "") default matches the protocol

    convention that an absent header is equivalent to an empty one, and

    the middleware''s validator (_is_safe_request_id) treats "" as a

    safety violation and regenerates a fresh UUID4. Direct subscript

    would raise KeyError on every request without the header, converting

    an optional protocol feature into a crash.

    '
  safety: 'All failure modes converge on _generate_request_id() — absent,

    empty, oversized, or control-character-bearing inbound ids are

    silently replaced with a fresh UUID4 so an attacker cannot poison

    the log correlation field.

    '
  expires: null
- key: web/async_workers.py:R6:run_sync_in_worker:fp=42677ae62a78782d
  owner: web-runtime
  reason: Event-loop wake polling in async-over-sync worker helper; TimeoutError from
    wait_for means the worker has not completed yet, not a failed operation.
  safety: The future is shielded so the worker keeps running; completed result or
    exception is returned on the next poll, and cancellation shuts down the one-call
    executor without swallowing the worker outcome.
  expires: null
- key: web/execution/runtime_preflight.py:R1:RuntimePreflightCoordinator:run:fp=2a8571a12863dbd7
  owner: web-execution
  reason: _inflight.get(key) checks whether a task for this key is already in-flight;
