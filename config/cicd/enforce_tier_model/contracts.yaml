- pattern: contracts/runtime_val_manifest.py
  rules:
  - R2
  - R5
  - R6
  reason: "ADR-010 §Decision 3 M3 + H2 N1 runtime-VAL manifest hashing — introspects arbitrary callables, CodeType constants, and TypedDict classes to build deterministic implementation hashes. getattr with explicit None default is marker-discovery semantics ('no such attribute exists'), not defensive coercion; isinstance dispatches over CodeType/tuple/list/frozenset/bytes/scalar to normalize code-object constants for stable JSON serialization; the sole except (OSError, TypeError) in _class_source_hash is for inspect.getsource() failures on builtin/dynamically-generated classes (expected, returns None so the hash falls back to the mro-only branch). Direct attribute access would crash on every non-decorated callable walked; replacing the isinstance dispatch would require a type registry. No silent error suppression — the except path returns an explicit None that the caller handles."
  expires: null
  max_hits: 30
