  rules:
  - R1
  reason: "Optional per-field coercion mapping — conversion_targets / target_types map only fields the operator explicitly requested coercion for. dict.get(field.name, field.field_type) with the original field type as default is identity semantics (unchanged fields pass through) and dict.get() on conversion_targets with explicit None check distinguishes configured vs. unconfigured fields — this IS the discriminator that controls whether type coercion runs. Neither .get() call is defensive bug-hiding."
  expires: null
  max_hits: 2
