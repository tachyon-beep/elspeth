- key: core/canonical.py:R6:_normalize_value:fp=b132c8b99f3017ce
  owner: architecture
  reason: TypeError from np.isnan/isinf on non-numeric dtypes is expected — non-numeric arrays can't contain NaN
  safety: Only catches TypeError from np.isnan/isinf, lets all other exceptions propagate
  expires: '2026-05-02'
