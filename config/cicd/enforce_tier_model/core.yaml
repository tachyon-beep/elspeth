- key: core/payload_store.py:R6:FilesystemPayloadStore:store:fp=7ffad90e4cb20922
  owner: architecture
  reason: TOCTOU race guard — FileNotFoundError means file was purged between read attempt and write fallback
  safety: Falls through to atomic write path, restoring the blob. No data loss.
  expires: null
- key: core/payload_store.py:R6:FilesystemPayloadStore:delete:fp=5e6dea501dc28457
  owner: architecture
  reason: Idempotent delete — FileNotFoundError means content already deleted (retention purge or duplicate call)
  safety: Returns False on missing file — caller informed, no silent data loss
  expires: null
- key: core/landscape/query_repository.py:R6:QueryRepository:explain_row:fp=60bbaf31e9f6472d
