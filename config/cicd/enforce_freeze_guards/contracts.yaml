per_file_rules:
- pattern: contracts/call_data.py
  rules:
  - FG1
  reason: HTTPCallRequest.headers and HTTPCallResponse.headers use MappingProxyType(dict()) — justified because values are str (scalars, no nested mutables)
  expires: null
  max_hits: 2
- pattern: contracts/call_data.py
  rules:
  - FG2
  reason: isinstance guards on json/params/headers/body check if already frozen before deep_freeze — idempotency optimization, body guard is load-bearing (Mapping|str|None union)
  expires: null
  max_hits: 5
- pattern: contracts/schema_contract.py
  rules:
  - FG1
  reason: SchemaContract._by_normalized and _by_original use shallow wraps — values are FieldContract (frozen DCs) and str (scalars)
