per_file_rules:
- pattern: contracts/declaration_contracts.py
  rules:
  - FG2
  reason: isinstance(self.row_data, Mapping) is a type-validation guard that raises
    TypeError on wrong type (offensive programming), then calls deep_freeze() on the
    validated value — not a conditional freeze bypass
  expires: null
  max_hits: 1
- pattern: contracts/diversion.py
  rules:
  - FG2
  reason: isinstance guards validate SinkWriteResult field types at construction (crash on wrong type) — offensive programming, not freeze guards
  expires: null
  max_hits: 1
- pattern: contracts/schema_contract.py
  rules:
  - FG1
  reason: SchemaContract._by_normalized and _by_original use shallow wraps — values are FieldContract (frozen DCs) and str (scalars)
  expires: null
  max_hits: 2
- pattern: contracts/config/runtime.py
  rules:
  - FG1
  reason: RuntimeRateLimitConfig.services uses MappingProxyType(dict()) — values are RuntimeServiceRateLimit (frozen DCs)
  expires: null
  max_hits: 1
- pattern: contracts/coalesce_checkpoint.py
  rules:
  - FG2
  reason: isinstance type guards validate checkpoint data structure at Tier 1 boundary (crash on wrong type)
  expires: null
  max_hits: 2
- pattern: contracts/aggregation_checkpoint.py
  rules:
  - FG2
  reason: isinstance type guards validate checkpoint data structure at Tier 1 boundary (crash on wrong type)
  expires: null
