# Alembic configuration for the sessions database.
#
# This is separate from the Landscape audit DB (project-root alembic.ini).
# The two databases have different trust models and deployment lifecycles.
#
# Usage:
#   cd src/elspeth/web/sessions
#   alembic revision --autogenerate -m "add blobs table"
#   alembic upgrade head
#
# Or from project root:
#   alembic -c src/elspeth/web/sessions/alembic.ini upgrade head

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = ../../../..
path_separator = os

# Default: resolved at runtime by env.py from WebSettings or env var.
# This fallback is used only when running alembic CLI directly without
# ELSPETH_WEB__SESSION_DB_URL set.
sqlalchemy.url = sqlite:///data/sessions.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
