# Audit Evidence Nominal Inheritance Enforcement
#
# Detects any class that defines to_audit_dict without inheriting
# AuditEvidenceBase (ADR-010 B4 control).  Fails on:
#   - Unallowlisted violations
#   - Stale allowlist entries (entries that don't match any code)
#   - Expired allowlist entries

name: Enforce Audit Evidence Nominal Inheritance

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'scripts/cicd/enforce_audit_evidence_nominal.py'
      - 'config/cicd/enforce_audit_evidence_nominal/**'
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'scripts/cicd/enforce_audit_evidence_nominal.py'
      - 'config/cicd/enforce_audit_evidence_nominal/**'

jobs:
  check:
    name: Check for AuditEvidenceBase nominal inheritance violations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run audit evidence nominal inheritance enforcement
        run: |
          python scripts/cicd/enforce_audit_evidence_nominal.py check \
            --root src/elspeth \
            --allowlist config/cicd/enforce_audit_evidence_nominal
