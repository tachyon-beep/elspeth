# Declaration Contract Manifest Enforcement
#
# Keeps EXPECTED_CONTRACTS in sync with register_declaration_contract(...)
# call sites under src/. CI backstop for ADR-010 §Decision 3 and issue
# elspeth-b03c6112c0 (C2). The runtime set-equality check in
# Orchestrator.prepare_for_run() is the last line of defence; this scanner
# catches drift at PR time so the failure never reaches production.
#
# Fails on:
#   - MC1 — register_declaration_contract call without manifest entry (or
#           unresolved call-site shape).
#   - MC2 — manifest entry without a registration call site.
#   - Stale allowlist entries (no longer matching any finding)
#   - Expired allowlist entries

name: Enforce Contract Manifest

on:
  push:
    branches: [main, master]
    paths:
      - 'src/elspeth/**.py'
      - 'scripts/cicd/enforce_contract_manifest.py'
      - 'config/cicd/enforce_contract_manifest/**'
  pull_request:
    paths:
      - 'src/elspeth/**.py'
      - 'scripts/cicd/enforce_contract_manifest.py'
      - 'config/cicd/enforce_contract_manifest/**'

jobs:
  check:
    name: Check for contract manifest drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run contract manifest enforcement
        run: |
          python scripts/cicd/enforce_contract_manifest.py check \
            --allowlist config/cicd/enforce_contract_manifest
