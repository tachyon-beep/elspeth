# Tier-1 Decoration Enforcement
#
# Detects any exception class ending in Error or Violation in errors.py that
# lacks either @tier_1_error(reason=...) (Tier-1 registration) or a
# # TIER-2: <justification> comment (explicit Tier-2 acknowledgement).
# Closes the symmetric failure mode of the decoration-IS-registration pattern
# (ADR-010 §Decision 2): forgetting to decorate a new Tier-1 exception silently
# demotes it to Tier-2, invisible to the registry and invisible to CI unless
# this scanner is running.
#
# Fails on:
#   - Unallowlisted violations
#   - Stale allowlist entries (entries that don't match any code)
#   - Expired allowlist entries

name: Enforce Tier-1 Decoration

on:
  push:
    branches: [main, master]
    paths:
      - 'src/elspeth/contracts/errors.py'
      - 'scripts/cicd/enforce_tier_1_decoration.py'
      - 'config/cicd/enforce_tier_1_decoration/**'
  pull_request:
    paths:
      - 'src/elspeth/contracts/errors.py'
      - 'scripts/cicd/enforce_tier_1_decoration.py'
      - 'config/cicd/enforce_tier_1_decoration/**'

jobs:
  check:
    name: Check for Tier-1 decoration violations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run tier-1 decoration enforcement
        run: |
          python scripts/cicd/enforce_tier_1_decoration.py check \
            --file src/elspeth/contracts/errors.py \
            --allowlist config/cicd/enforce_tier_1_decoration
