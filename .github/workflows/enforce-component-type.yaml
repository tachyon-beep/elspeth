# Component Type Enforcement
#
# Runs AST-based static analysis to detect DataPluginConfig subclasses
# that don't set _plugin_component_type. Fails on:
#   - Unallowlisted CT1 violations
#   - Stale allowlist entries (entries that don't match any code)
#   - Expired allowlist entries

name: Enforce Component Type

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'scripts/cicd/enforce_component_type.py'
      - 'config/cicd/enforce_component_type/**'
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'scripts/cicd/enforce_component_type.py'
      - 'config/cicd/enforce_component_type/**'

jobs:
  check:
    name: Check for missing _plugin_component_type
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run component type enforcement
        run: |
          python scripts/cicd/enforce_component_type.py check \
            --root src/elspeth \
            --allowlist config/cicd/enforce_component_type
