source:
  plugin: csv
  on_success: output
  options:
    path: examples/chroma_rag_indexed/documents.csv
    schema:
      mode: fixed
      fields:
      - 'doc_id: str'
      - 'text_content: str'
      - 'topic: str'
      - 'subtopic: str'
    on_validation_failure: discard

sinks:
  output:
    plugin: chroma_sink
    on_write_failure: discard
    options:
      collection: science-facts-indexed
      mode: persistent
      persist_directory: examples/chroma_rag_indexed/chroma_data
      distance_function: cosine
      field_mapping:
        document_field: text_content
        id_field: doc_id
        metadata_fields:
        - topic
        - subtopic
      on_duplicate: overwrite
      schema:
        mode: fixed
        fields:
        - 'doc_id: str'
        - 'text_content: str'
        - 'topic: str'
        - 'subtopic: str'

landscape:
  url: sqlite:///examples/chroma_rag_indexed/runs/audit.db
