depends_on:
- name: index_corpus
  settings: ./index_pipeline.yaml

collection_probes:
- collection: science-facts-indexed
  provider: chroma
  provider_config:
    mode: persistent
    persist_directory: examples/chroma_rag_indexed/chroma_data

commencement_gates:
- name: corpus_ready
  condition: "collections['science-facts-indexed']['count'] > 0"

source:
  plugin: csv
  on_success: rag_in
  options:
    path: examples/chroma_rag_indexed/questions.csv
    schema:
      mode: fixed
      fields:
      - 'id: int'
      - 'question: str'
    on_validation_failure: discard

transforms:
- name: retrieve
  plugin: rag_retrieval
  input: rag_in
  on_success: output
  on_error: quarantine
  options:
    query_field: question
    output_prefix: sci
    provider: chroma
    provider_config:
      collection: science-facts-indexed
      mode: persistent
      persist_directory: examples/chroma_rag_indexed/chroma_data
      distance_function: cosine
    top_k: 3
    min_score: 0.0
    on_no_results: quarantine
    context_format: numbered
    schema:
      mode: flexible
      fields:
      - 'id: int'
      - 'question: str'

sinks:
  output:
    plugin: json
    options:
      path: examples/chroma_rag_indexed/output/results.jsonl
      schema:
        mode: observed
      format: jsonl
  quarantine:
    plugin: json
    options:
      path: examples/chroma_rag_indexed/output/quarantined.jsonl
      schema:
        mode: observed
      format: jsonl

landscape:
  url: sqlite:///examples/chroma_rag_indexed/runs/audit.db
