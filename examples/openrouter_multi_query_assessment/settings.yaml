source:
  plugin: csv
  on_success: source_out
  options:
    path: examples/openrouter_multi_query_assessment/input.csv
    schema:
      mode: flexible
      fields:
      - 'user_id: str'
      - 'cs1_background: str'
      - 'cs1_symptoms: str'
      - 'cs1_history: str'
      - 'cs2_background: str'
      - 'cs2_symptoms: str'
      - 'cs2_history: str'
    on_validation_failure: discard
transforms:
- name: llm_0
  plugin: llm
  input: source_out
  on_success: output
  on_error: quarantine
  options:
    provider: openrouter
    model: anthropic/claude-3-5-sonnet
    api_key: ${OPENROUTER_API_KEY}
    system_prompt: 'You are a medical assessment AI. For each case study and criterion,

      provide a score (0-100) and rationale. Respond ONLY in JSON format:

      {"score": <number>, "rationale": "<explanation>"}

      '
    template: 'Assess: {{ row.input_1 }}'
    required_input_fields: []
    queries:
      cs1_diagnosis:
        input_fields:
          input_1: cs1_background
          input_2: cs1_symptoms
          input_3: cs1_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Diagnosis
          Assess the accuracy and completeness of the diagnosis

          Consider these subcriteria:
          - Correct primary diagnosis
          - Appropriate differential diagnoses considered
          - Evidence-based reasoning

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
      cs1_treatment:
        input_fields:
          input_1: cs1_background
          input_2: cs1_symptoms
          input_3: cs1_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Treatment
          Assess the appropriateness of the treatment plan

          Consider these subcriteria:
          - Guideline-concordant treatment
          - Patient-specific considerations
          - Risk-benefit analysis

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
      cs1_prognosis:
        input_fields:
          input_1: cs1_background
          input_2: cs1_symptoms
          input_3: cs1_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Prognosis
          Assess the accuracy of prognostic assessment

          Consider these subcriteria:
          - Realistic timeline
          - Key prognostic factors identified
          - Clear communication

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
      cs1_risk:
        input_fields:
          input_1: cs1_background
          input_2: cs1_symptoms
          input_3: cs1_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Risk
          Assess identification of risks and complications

          Consider these subcriteria:
          - Comprehensive risk identification
          - Appropriate severity assessment
          - Mitigation strategies

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
      cs1_followup:
        input_fields:
          input_1: cs1_background
          input_2: cs1_symptoms
          input_3: cs1_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Follow-up
          Assess the follow-up and monitoring plan

          Consider these subcriteria:
          - Appropriate follow-up timeline
          - Clear monitoring parameters
          - Escalation criteria defined

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
      cs2_diagnosis:
        input_fields:
          input_1: cs2_background
          input_2: cs2_symptoms
          input_3: cs2_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Diagnosis
          Assess the accuracy and completeness of the diagnosis

          Consider these subcriteria:
          - Correct primary diagnosis
          - Appropriate differential diagnoses considered
          - Evidence-based reasoning

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
      cs2_treatment:
        input_fields:
          input_1: cs2_background
          input_2: cs2_symptoms
          input_3: cs2_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Treatment
          Assess the appropriateness of the treatment plan

          Consider these subcriteria:
          - Guideline-concordant treatment
          - Patient-specific considerations
          - Risk-benefit analysis

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
      cs2_prognosis:
        input_fields:
          input_1: cs2_background
          input_2: cs2_symptoms
          input_3: cs2_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Prognosis
          Assess the accuracy of prognostic assessment

          Consider these subcriteria:
          - Realistic timeline
          - Key prognostic factors identified
          - Clear communication

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
      cs2_risk:
        input_fields:
          input_1: cs2_background
          input_2: cs2_symptoms
          input_3: cs2_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Risk
          Assess identification of risks and complications

          Consider these subcriteria:
          - Comprehensive risk identification
          - Appropriate severity assessment
          - Mitigation strategies

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
      cs2_followup:
        input_fields:
          input_1: cs2_background
          input_2: cs2_symptoms
          input_3: cs2_history
        template: |
          ## Case Study
          **Background:** {{ row.input_1 }}
          **Symptoms:** {{ row.input_2 }}
          **History:** {{ row.input_3 }}

          ## Evaluation Criterion: Follow-up
          Assess the follow-up and monitoring plan

          Consider these subcriteria:
          - Appropriate follow-up timeline
          - Clear monitoring parameters
          - Escalation criteria defined

          Provide your assessment.
        output_fields:
          - suffix: score
            type: integer
          - suffix: rationale
            type: string
    pool_size: 10
    temperature: 0.0
    max_tokens: 500
    schema:
      mode: observed
sinks:
  output:
    plugin: csv
    options:
      path: examples/openrouter_multi_query_assessment/output/results.csv
      schema:
        mode: observed
  quarantine:
    plugin: json
    options:
      path: examples/openrouter_multi_query_assessment/output/quarantine.json
      schema:
        mode: observed
landscape:
  url: sqlite:///examples/openrouter_multi_query_assessment/runs/audit.db
