source:
  plugin: csv
  on_success: source_out
  options:
    path: examples/openrouter_multi_query_assessment/input_overflow.csv
    schema:
      mode: flexible
      fields:
      - 'user_id: str'
      - 'cs1_word: str'
      - 'cs1_number: str'
      - 'cs1_color: str'
      - 'cs2_word: str'
      - 'cs2_number: str'
      - 'cs2_color: str'
    on_validation_failure: discard
transforms:
- plugin: llm
  name: assessment_multi_query
  input: source_out
  on_success: output
  on_error: discard
  options:
    provider: openrouter
    model: anthropic/claude-3-5-sonnet
    api_key: ${OPENROUTER_API_KEY}
    system_prompt: "You are an echo bot. Your ONLY job is to echo back the exact values\nprovided in the query. Respond in\
      \ this EXACT JSON format:\n{\n  \"echo_row\": \"<the ROW value>\",\n  \"echo_case\": \"<the CASE value>\",\n  \"echo_criterion\"\
      : \"<the CRITERION value>\",\n  \"echo_word\": \"<the WORD value>\",\n  \"echo_number\": \"<the NUMBER value>\",\n \
      \ \"echo_color\": \"<the COLOR value>\"\n}\n\nCopy the values EXACTLY as provided. Do not add or change anything.\n"
    template: 'Echo: {{ row.input_1 }}'
    required_input_fields: []
    queries:
      cs1_criterion_a:
        input_fields:
          input_1: cs1_word
          input_2: cs1_number
          input_3: cs1_color
        template: |
          ECHO THESE VALUES EXACTLY:

          ROW={{ row.source_row.user_id }}
          CASE=cs1
          CRITERION=CRIT-A
          WORD={{ row.input_1 }}
          NUMBER={{ row.input_2 }}
          COLOR={{ row.input_3 }}

          Respond with JSON containing these exact values.
        output_fields:
          - suffix: echo_row
            type: string
          - suffix: echo_case
            type: string
          - suffix: echo_criterion
            type: string
          - suffix: echo_word
            type: string
          - suffix: echo_number
            type: string
          - suffix: echo_color
            type: string
      cs1_criterion_b:
        input_fields:
          input_1: cs1_word
          input_2: cs1_number
          input_3: cs1_color
        template: |
          ECHO THESE VALUES EXACTLY:

          ROW={{ row.source_row.user_id }}
          CASE=cs1
          CRITERION=CRIT-B
          WORD={{ row.input_1 }}
          NUMBER={{ row.input_2 }}
          COLOR={{ row.input_3 }}

          Respond with JSON containing these exact values.
        output_fields:
          - suffix: echo_row
            type: string
          - suffix: echo_case
            type: string
          - suffix: echo_criterion
            type: string
          - suffix: echo_word
            type: string
          - suffix: echo_number
            type: string
          - suffix: echo_color
            type: string
      cs1_criterion_c:
