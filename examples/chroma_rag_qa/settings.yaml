source:
  plugin: csv
  on_success: rag_in
  options:
    path: examples/chroma_rag_qa/input.csv
    schema:
      mode: fixed
      fields:
      - 'id: int'
      - 'question: str'
    on_validation_failure: discard

transforms:
# Step 1: Retrieve relevant context from ChromaDB
- name: rag_0
  plugin: rag_retrieval
  input: rag_in
  on_success: llm_in
  on_error: quarantine
  options:
    query_field: question
    output_prefix: sci
    provider: chroma
    provider_config:
      collection: science-facts
      mode: persistent
      persist_directory: examples/chroma_rag_qa/chroma_data
      distance_function: cosine
    top_k: 3
    min_score: 0.3
    on_no_results: continue
    context_format: numbered
    schema:
      mode: observed

# Step 2: Answer the question using retrieved context via OpenRouter LLM
- name: llm_0
  plugin: llm
  input: llm_in
  on_success: output
  on_error: quarantine
  options:
    provider: openrouter
    api_key: ${OPENROUTER_API_KEY}
    model: openai/gpt-4o-mini
    temperature: 0.2
    template: >
      You are a knowledgeable science assistant. Answer the question using
      ONLY the reference material provided below. If the reference material
      does not contain enough information, say so honestly.

      ## Question
      {{ row.question }}

      ## Reference Material
      {% if row.sci__rag_context %}
      {{ row.sci__rag_context }}
      {% else %}
      No reference material was found for this question.
      {% endif %}

      Respond with a JSON object in exactly this format:
      {"answer": "your concise answer based on the references", "confidence": "high/medium/low", "sources_used": number_of_references_you_drew_from}
    response_field: llm_answer
    required_input_fields: []
    schema:
      mode: observed

sinks:
  output:
    plugin: json
    options:
      path: examples/chroma_rag_qa/output/results.jsonl
      schema:
        mode: observed
      format: jsonl
  quarantine:
    plugin: json
    options:
      path: examples/chroma_rag_qa/output/quarantined.jsonl
      schema:
        mode: observed
      format: jsonl

landscape:
  url: sqlite:///examples/chroma_rag_qa/runs/audit.db

retry:
  max_attempts: 3
  initial_delay_seconds: 1.0
  max_delay_seconds: 15.0
  exponential_base: 2.0
