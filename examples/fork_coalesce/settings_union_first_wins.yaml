# Fork/Coalesce Example — Union Merge with `first_wins` Collision Policy
#
# Demonstrates `union_collision_policy: first_wins` — on collision, the
# FIRST branch in declaration order wins. This flips the winner from the
# `last_wins` variant while leaving all collision provenance intact.
#
#   source ─(raw)─> [fork_gate] ─┬─ path_a ─> truncate(20) ─(trunc_a)─┐
#                                 └─ path_b ─> truncate(50) ─(trunc_b)─┤
#                                                                       ├─ [merge_results]
#                                                            (merged)──> [route_output] ─> output
#
# With `first_wins`, path_a's 20-char truncation appears in the merged
# output. The audit trail still records both branches' values in
# `union_field_collision_values` so reviewers can inspect what was
# suppressed.
#
# NOTE: `union_collision_policy` is orthogonal to the arrival `policy`
# (require_all / quorum / best_effort / first). They are separate axes:
# arrival policy decides WHEN to merge; collision policy decides HOW to
# reconcile overlapping field names once merging begins.

source:
  plugin: csv
  on_success: raw
  options:
    path: examples/fork_coalesce/input.csv
    schema:
      mode: fixed
      fields:
      - 'id: int'
      - 'product: str'
      - 'price: int'
      - 'category: str'
      - 'description: str'
    on_validation_failure: discard

gates:
- name: fork_gate
  input: raw
  condition: "True"
  routes:
    'true': fork
    'false': output
  fork_to:
    - path_a
    - path_b

- name: route_output
  input: merge_results
  condition: "True"
  routes:
    'true': output
    'false': output

transforms:
# Branch A: aggressive truncation — 20 chars (wins under first_wins)
- name: truncate_branch_a
  plugin: truncate
  input: path_a
  on_success: trunc_a
  on_error: discard
  options:
    fields:
      description: 20
    suffix: "..."
    schema:
      mode: observed

# Branch B: lenient truncation — 50 chars (loses under first_wins)
- name: truncate_branch_b
  plugin: truncate
  input: path_b
  on_success: trunc_b
  on_error: discard
  options:
    fields:
      description: 50
    suffix: "..."
    schema:
      mode: observed

coalesce:
- name: merge_results
  branches:
    path_a: trunc_a
    path_b: trunc_b
  policy: require_all
  merge: union
  union_collision_policy: first_wins   # path_a wins on collision

sinks:
  output:
    plugin: json
    on_write_failure: discard
    options:
      path: examples/fork_coalesce/output/union_first_wins.json
      schema:
        mode: observed
      format: jsonl

landscape:
  url: sqlite:///examples/fork_coalesce/runs/union_first_wins.db
