# Fork/Coalesce Example — Union Merge with `last_wins` Collision Policy
#
# Demonstrates `union_collision_policy: last_wins` — the default behavior
# where the LAST branch in declaration order wins on field collisions.
#
#   source ─(raw)─> [fork_gate] ─┬─ path_a ─> truncate(20) ─(trunc_a)─┐
#                                 └─ path_b ─> truncate(50) ─(trunc_b)─┤
#                                                                       ├─ [merge_results]
#                                                            (merged)──> [route_output] ─> output
#
# Both branches emit the same set of fields (id, product, price, category,
# description). Every field collides on union merge because both branches
# carry every column — but only `description` has a genuinely different
# value (path_a truncates to 20 chars, path_b to 50). With `last_wins`,
# path_b's 50-char description wins.
#
# The audit trail records `union_field_origins` and
# `union_field_collision_values` for every colliding field, so the full
# provenance is preserved regardless of which branch the runtime selected.
#
# NOTE: `union_collision_policy` is orthogonal to the arrival `policy`
# (require_all / quorum / best_effort / first). They are separate axes:
# arrival policy decides WHEN to merge; collision policy decides HOW to
# reconcile overlapping field names once merging begins.

source:
  plugin: csv
  on_success: raw
  options:
    path: examples/fork_coalesce/input.csv
    schema:
      mode: fixed
      fields:
      - 'id: int'
      - 'product: str'
      - 'price: int'
      - 'category: str'
      - 'description: str'
    on_validation_failure: discard

gates:
- name: fork_gate
  input: raw
  condition: "True"
  routes:
    'true': fork
    'false': output
  fork_to:
    - path_a
    - path_b

- name: route_output
  input: merge_results
  condition: "True"
  routes:
    'true': output
    'false': output

transforms:
# Branch A: aggressive truncation — 20 chars
- name: truncate_branch_a
  plugin: truncate
  input: path_a
  on_success: trunc_a
  on_error: discard
  options:
    fields:
      description: 20
    suffix: "..."
    schema:
      mode: observed

# Branch B: lenient truncation — 50 chars
- name: truncate_branch_b
  plugin: truncate
  input: path_b
  on_success: trunc_b
  on_error: discard
  options:
    fields:
      description: 50
    suffix: "..."
    schema:
      mode: observed

coalesce:
- name: merge_results
  branches:
    path_a: trunc_a
    path_b: trunc_b
  policy: require_all
  merge: union
  union_collision_policy: last_wins   # path_b wins on collision

sinks:
  output:
    plugin: json
    on_write_failure: discard
    options:
      path: examples/fork_coalesce/output/union_last_wins.json
      schema:
        mode: observed
      format: jsonl

landscape:
  url: sqlite:///examples/fork_coalesce/runs/union_last_wins.db
