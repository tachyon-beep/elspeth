source:
  plugin: csv
  on_success: rag_in
  options:
    path: examples/chroma_rag/input.csv
    schema:
      mode: fixed
      fields:
      - 'id: int'
      - 'question: str'
    on_validation_failure: discard

transforms:
- name: rag_0
  plugin: rag_retrieval
  input: rag_in
  on_success: output
  on_error: quarantine
  options:
    query_field: question
    output_prefix: sci
    provider: chroma
    provider_config:
      collection: science-facts
      mode: persistent
      persist_directory: examples/chroma_rag/chroma_data
      distance_function: cosine
    top_k: 3
    min_score: 0.3
    on_no_results: continue
    context_format: numbered
    context_separator: "\n---\n"
    schema:
      mode: flexible
      fields:
      - 'id: int'
      - 'question: str'

sinks:
  output:
    plugin: json
    on_write_failure: discard
    options:
      path: examples/chroma_rag/output/results.jsonl
      schema:
        mode: observed
      format: jsonl
  quarantine:
    plugin: json
    on_write_failure: discard
    options:
      path: examples/chroma_rag/output/quarantined.jsonl
      schema:
        mode: observed
      format: jsonl

landscape:
  url: sqlite:///examples/chroma_rag/runs/audit.db
